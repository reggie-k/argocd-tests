apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps-prune
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/reggie-k/argocd-tests.git'
    targetRevision: main
    path: manifests/app-of-apps-prune
  destination:
    server: https://kubernetes.default.svc
    namespace: kuku
  syncPolicy:
    automated:
      prune: true
      selfHeal: false