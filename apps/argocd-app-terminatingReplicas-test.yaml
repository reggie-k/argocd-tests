apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terminatingReplicas
  namespace: argocd
spec:
  project: default
  destination:
    namespace: kuku
    server: 'https://kubernetes.default.svc'
  source:
    path: manifests/terminatingReplicas-test
    repoURL: 'https://github.com/reggie-k/argocd-tests.git'
    targetRevision: main
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true      
